# Prometheus scrape configuration for the bench harness.
global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/connectanum_router_alerts.yml
  - /etc/prometheus/connectanum_bench_artifact_alerts.yml

scrape_configs:
  - job_name: connectanum-bench
    metrics_path: /metrics
    static_configs:
      - targets:
          # Docker resolves host.docker.internal on macOS/Windows automatically.
          # For Linux this compose stack adds an extra host entry pointing to host-gateway.
          - host.docker.internal:8080

  - job_name: connectanum-bench-artifacts
    static_configs:
      - targets:
          - node-exporter:9100
