name = "wamp_client_impl_smoke"
description = "Compare Dart and native connectanum_client implementations on the same WAMP workloads."

[[workloads]]
name = "rawsocket_rpc_json_dart"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "json"
path = "bench.rpc.echo"
iterations = 48
concurrency = 4
request_bytes = 512

[[workloads]]
name = "rawsocket_rpc_json_native"
protocol = "wamp_rawsocket_rpc"
client_impl = "native"
serializer = "json"
path = "bench.rpc.echo"
iterations = 48
concurrency = 4
request_bytes = 512

[[workloads]]
name = "rawsocket_pubsub_cbor_dart"
protocol = "wamp_rawsocket_pubsub"
client_impl = "dart"
serializer = "cbor"
path = "bench.wamp.topic"
iterations = 40
concurrency = 4
request_bytes = 512

[[workloads]]
name = "rawsocket_pubsub_cbor_native"
protocol = "wamp_rawsocket_pubsub"
client_impl = "native"
serializer = "cbor"
path = "bench.wamp.topic"
iterations = 40
concurrency = 4
request_bytes = 512

[[workloads]]
name = "websocket_rpc_json_dart"
protocol = "wamp_websocket_rpc"
client_impl = "dart"
serializer = "json"
path = "bench.rpc.echo"
iterations = 48
concurrency = 4
request_bytes = 512

[[workloads]]
name = "websocket_rpc_json_native"
protocol = "wamp_websocket_rpc"
client_impl = "native"
serializer = "json"
path = "bench.rpc.echo"
iterations = 48
concurrency = 4
request_bytes = 512

[[workloads]]
name = "websocket_pubsub_cbor_dart"
protocol = "wamp_websocket_pubsub"
client_impl = "dart"
serializer = "cbor"
path = "bench.wamp.topic"
iterations = 40
concurrency = 4
request_bytes = 512

[[workloads]]
name = "websocket_pubsub_cbor_native"
protocol = "wamp_websocket_pubsub"
client_impl = "native"
serializer = "cbor"
path = "bench.wamp.topic"
iterations = 40
concurrency = 4
request_bytes = 512
