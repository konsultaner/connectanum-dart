name = "wamp_payload_mode_smoke"
description = "Side-by-side no-PPT versus PPT WAMP smoke comparison for Dart and native clients."

[[workloads]]
name = "rawsocket_rpc_cbor_plain_dart"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "cbor"
path = "bench.rpc.echo"
iterations = 32
concurrency = 4
request_bytes = 512

[[workloads]]
name = "rawsocket_rpc_cbor_plain_native"
protocol = "wamp_rawsocket_rpc"
client_impl = "native"
serializer = "cbor"
path = "bench.rpc.echo"
iterations = 32
concurrency = 4
request_bytes = 512

