name = "wamp_final_release_features"
description = "Release gate for progressive call invocations, call timeout enforcement, and all 15 read/statistics Meta API procedures across RawSocket/WebSocket and Dart/native clients."

[[workloads]]
name = "rawsocket_progressive_dart_json_to_cbor_1k"
protocol = "wamp_rawsocket_progressive_rpc"
client_impl = "dart"
serializer = "json"
peer_serializer = "cbor"
path = "bench.release.progressive"
iterations = 12
concurrency = 2
in_flight_per_session = 2
request_bytes = 1024

