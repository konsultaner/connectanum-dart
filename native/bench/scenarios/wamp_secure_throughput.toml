name = "wamp_secure_throughput"
description = "Large-payload secure WAMP throughput sweep covering PUB/SUB + RPC across JSON, MsgPack, and CBOR on RawSocket and WebSocket against the TLS WAMP listener."

[[workloads]]
name = "rawsocket_secure_pubsub_json_64k"
protocol = "wamp_rawsocket_pubsub"
serializer = "json"
path = "bench.wamp.topic"
iterations = 48
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536
auth_realm = "bench.secure"
auth_method = "ticket"
auth_id = "bench-user"
auth_secret = "bench-ticket"
secure_transport = true

