name = "transport_mbit_matrix_smoke"
description = "Comparable Mbit-only smoke matrix across HTTP and WAMP transports, covering auth, RPC, pub/sub, representative payload sizes, websocket continuation sizes, and WAMP ACL off/on."

[[workloads]]
name = "rawsocket_auth_anonymous"
protocol = "wamp_rawsocket_auth"
client_impl = "native"
serializer = "cbor"
uri = "bench.auth"
iterations = 4
concurrency = 1

