name = "wamp_e2ee_throughput"
description = "Canonical payload E2EE throughput gate across both release ciphers, Dart/native clients, RawSocket/WebSocket, and RPC/pub-sub."

[[workloads]]
name = "rawsocket_rpc_aes_dart_64k"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "cbor"
peer_serializer = "cbor"
path = "bench.rpc.echo"
iterations = 12
concurrency = 4
in_flight_per_session = 2
request_bytes = 65536
ppt_scheme = "wamp"
ppt_serializer = "cbor"
ppt_cipher = "aes256gcm"
ppt_keyid = "benchmark-key"

