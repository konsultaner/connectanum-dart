name = "wamp_mixed_serializer_throughput"
description = "Cross-serializer WAMP throughput across RawSocket and WebSocket using real remote peers."

[[workloads]]
name = "rawsocket_rpc_json_to_msgpack_dart"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "json"
peer_serializer = "msgpack"
path = "bench.rpc.echo"
iterations = 32
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536

[[workloads]]
name = "rawsocket_rpc_json_to_msgpack_native"
protocol = "wamp_rawsocket_rpc"
client_impl = "native"
serializer = "json"
peer_serializer = "msgpack"
path = "bench.rpc.echo"
iterations = 32
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536

[[workloads]]
name = "rawsocket_pubsub_msgpack_to_cbor_dart"
