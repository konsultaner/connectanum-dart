name = "wamp_transport_throughput"
description = "Large-payload WAMP throughput sweep covering PUB/SUB + RPC across JSON, MsgPack, and CBOR on RawSocket and WebSocket."

[[workloads]]
name = "rawsocket_pubsub_json_64k"
protocol = "wamp_rawsocket_pubsub"
serializer = "json"
path = "bench.wamp.topic"
iterations = 48
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536

