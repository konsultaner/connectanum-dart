name = "wamp_payload_mode_throughput"
description = "Side-by-side no-PPT versus PPT WAMP throughput comparison for Dart and native clients."

[[workloads]]
name = "rawsocket_rpc_cbor_plain_dart"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "cbor"
iterations = 32
concurrency = 6
in_flight_per_session = 4
path = "bench.rpc.echo"
request_bytes = 65536

[[workloads]]
name = "rawsocket_rpc_cbor_plain_native"
protocol = "wamp_rawsocket_rpc"
client_impl = "native"
