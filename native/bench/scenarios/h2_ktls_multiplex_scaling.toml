name = "h2_ktls_multiplex_scaling"
description = "HTTP/2 multiplex-only diagnostic benchmark for baseline TLS versus required kTLS comparison reruns."

[[workloads]]
name = "h2_multiplexed_streams_s1"
protocol = "h2"
path = "/bench/stream"
method = "POST"
iterations = 20
concurrency = 4
streams_per_connection = 1
request_bytes = 262144
response_bytes = 1048576
request_chunk_bytes = 65536
response_chunk_bytes = 131072
warmup_ms = 500

