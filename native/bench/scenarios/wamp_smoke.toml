name = "wamp_smoke"
description = "RawSocket and WebSocket PUB/SUB + RPC workloads covering JSON, MsgPack, and CBOR on both transports."

[[workloads]]
name = "rawsocket_pubsub_json"
protocol = "wamp_rawsocket_pubsub"
serializer = "json"
path = "bench.wamp.topic"
iterations = 50
concurrency = 4
request_bytes = 256

[[workloads]]
name = "rawsocket_pubsub_msgpack"
protocol = "wamp_rawsocket_pubsub"
serializer = "msgpack"
path = "bench.wamp.topic"
iterations = 50
concurrency = 4
request_bytes = 256

[[workloads]]
name = "rawsocket_pubsub_cbor"
protocol = "wamp_rawsocket_pubsub"
serializer = "cbor"
path = "bench.wamp.topic"
iterations = 50
concurrency = 4
request_bytes = 256

[[workloads]]
name = "rawsocket_rpc_json"
protocol = "wamp_rawsocket_rpc"
serializer = "json"
path = "bench.rpc.echo"
iterations = 100
concurrency = 8
request_bytes = 256

[[workloads]]
name = "rawsocket_rpc_msgpack"
protocol = "wamp_rawsocket_rpc"
