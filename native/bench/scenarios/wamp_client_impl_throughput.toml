name = "wamp_client_impl_throughput"
description = "Hot-session throughput comparison between Dart and native WAMP clients."

[[workloads]]
name = "rawsocket_rpc_cbor_64k_dart"
protocol = "wamp_rawsocket_rpc"
client_impl = "dart"
serializer = "cbor"
path = "bench.rpc.echo"
iterations = 32
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536

[[workloads]]
name = "rawsocket_rpc_cbor_64k_native"
protocol = "wamp_rawsocket_rpc"
client_impl = "native"
serializer = "cbor"
path = "bench.rpc.echo"
iterations = 32
concurrency = 6
in_flight_per_session = 4
request_bytes = 65536

