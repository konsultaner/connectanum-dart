name = "full_stack"
description = "Extended benchmark covering HTTP/2 and HTTP/3 bulk, latency, and soak workloads."

[[workloads]]
name = "h2_small_warmup"
protocol = "h2"
path = "/bench/stream"
method = "POST"
iterations = 4
concurrency = 2
request_bytes = 65536
response_bytes = 65536
request_chunk_bytes = 32768
response_chunk_bytes = 32768
warmup_ms = 500

[[workloads]]
name = "h2_bulk_upload"
protocol = "h2"
path = "/bench/stream"
method = "POST"
iterations = 12
concurrency = 4
request_bytes = 1048576        # 1 MiB upload
response_bytes = 131072
request_chunk_bytes = 262144
response_chunk_bytes = 65536

[[workloads]]
name = "h2_bulk_download"
protocol = "h2"
path = "/bench/stream"
method = "POST"
iterations = 8
concurrency = 6
