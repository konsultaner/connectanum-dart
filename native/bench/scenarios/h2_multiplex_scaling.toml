name = "h2_multiplex_scaling"
description = "HTTP/2 sustained-transfer benchmark that drives multiple concurrent streams per reused connection."

[[workloads]]
name = "h2_multiplexed_streams"
protocol = "h2"
path = "/bench/stream"
method = "POST"
iterations = 32
concurrency = 4
streams_per_connection = 4
request_bytes = 262144
response_bytes = 1048576
request_chunk_bytes = 65536
response_chunk_bytes = 131072
warmup_ms = 500
