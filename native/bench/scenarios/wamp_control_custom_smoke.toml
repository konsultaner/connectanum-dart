name = "wamp_control_custom_smoke"
description = "Control-heavy native WAMP workloads with custom option/detail fields enabled so ct_message_peek direct-bind coverage is exercised on richer control maps."

[[workloads]]
name = "rawsocket_publish_ack_msgpack_custom"
protocol = "wamp_rawsocket_publish_ack"
client_impl = "native"
serializer = "msgpack"
path = "bench.control.topic"
iterations = 64
concurrency = 8
in_flight_per_session = 4
request_bytes = 128
control_custom_fields = true

