name = "wamp_control_smoke"
description = "Control-heavy native WAMP workloads covering publish acknowledgements, subscribe cycles, and register cycles across RawSocket/WebSocket and JSON/MsgPack/CBOR."

[[workloads]]
name = "rawsocket_publish_ack_json"
protocol = "wamp_rawsocket_publish_ack"
client_impl = "native"
serializer = "json"
path = "bench.control.topic"
iterations = 96
concurrency = 8
in_flight_per_session = 4
request_bytes = 128

