name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run fast regression set
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/test-fast

  verify:
    name: Full Verify
    runs-on: ubuntu-latest
    needs: fast
    env:
      CONNECTANUM_ARTIFACT_DIR: ${{ github.workspace }}/out/ci-artifacts

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run full verification
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/verify

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: out/ci-artifacts
          if-no-files-found: ignore
