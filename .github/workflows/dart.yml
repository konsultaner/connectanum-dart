name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run fast regression set
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/test-fast

  verify:
    name: Full Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: fast

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run full verification
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/verify

  coverage:
    name: Dart VM Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: fast
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap workspace
        run: bin/bootstrap

      - name: Activate coverage tooling
        run: dart pub global activate coverage 1.15.1

      - name: Collect Dart VM coverage
        env:
          CONNECTANUM_COVERAGE_DIR: out/coverage
        run: bin/test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: out/coverage/lcov.info
          flags: dart-vm
          name: dart-vm
          plugins: noop
          use_oidc: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dart-vm-coverage
          path: out/coverage/lcov.info
          if-no-files-found: error
