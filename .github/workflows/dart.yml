name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run fast regression set
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/test-fast

  verify:
    name: Full Verify
    runs-on: ubuntu-latest
    needs: fast

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run full verification
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/verify

  wamp-profile:
    name: WAMP Profile Gates
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap workspace
        run: bin/bootstrap

      - name: Run canonical WAMP profile gates
        run: |
          set -euo pipefail
          bin/wamp-profile-validate \
            --out-dir "${GITHUB_WORKSPACE}/out/wamp-profile-validation" \
            --router-worker-counts 1 \
            --native-runtime-thread-counts 1 \
            --workload-timeout-ms 300000

      - name: Upload WAMP profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wamp-profile-benchmark-artifacts
          path: out/wamp-profile-validation
          if-no-files-found: error
