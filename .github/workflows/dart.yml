name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run fast regression set
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/test-fast

  verify:
    name: Full Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: fast

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Bootstrap workspace
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/bootstrap

      - name: Run full verification
        env:
          CHROME_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: bin/verify
