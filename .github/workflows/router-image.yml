name: Router Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional explicit image tag override; project v* tags publish without the leading v
        required: false
        type: string
      dry_run:
        description: Build and validate image metadata without pushing to GHCR
        required: true
        default: true
        type: boolean
      publish_approval:
        description: Required for manual publishes; must exactly match the primary image tag
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-router-image:
    name: Publish Router Image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image metadata
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_PUBLISH_APPROVAL: ${{ github.event.inputs.publish_approval }}
        run: |
          set -euo pipefail

          preview_dir="out/router-image-preview"
          summary_file="$preview_dir/router-image-metadata.md"
          mkdir -p "$preview_dir"

          python3 tool/render_router_image_metadata.py \
            --github-output "$GITHUB_OUTPUT" \
            --summary "$summary_file"

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload router image preview
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: router-image-preview
          path: out/router-image-preview

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build or publish multi-arch router image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.meta.outputs.push == 'true' }}
          outputs: ${{ steps.meta.outputs.outputs }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ steps.meta.outputs.provenance }}
          sbom: ${{ steps.meta.outputs.sbom }}
          cache-from: type=gha,scope=router-image
          cache-to: type=gha,mode=max,scope=router-image
