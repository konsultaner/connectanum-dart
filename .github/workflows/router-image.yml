name: Router Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional explicit image tag override for manual publishes
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-router-image:
    name: Publish Router Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/connectanum-router"
          labels=(
            "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            "org.opencontainers.image.revision=${GITHUB_SHA}"
            "org.opencontainers.image.title=connectanum-router"
            "org.opencontainers.image.description=Multi-arch container image for the Connectanum router runner"
          )
          tags=()

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("$image:$version")
            labels+=("org.opencontainers.image.version=$version")

            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              major_minor="${version%.*}"
              major="${version%%.*}"
              tags+=("$image:$major_minor" "$image:$major" "$image:latest")
            fi
          else
            tag="${INPUT_IMAGE_TAG:-sha-${GITHUB_SHA::12}}"
            tags+=("$image:$tag")
            labels+=("org.opencontainers.image.version=$tag")
          fi

          {
            printf 'image=%s\n' "$image"
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
            printf 'labels<<EOF\n'
            printf '%s\n' "${labels[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch router image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=router-image
          cache-to: type=gha,mode=max,scope=router-image
