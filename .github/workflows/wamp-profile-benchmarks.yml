name: WAMP Profile Benchmarks

on:
  push:
    branches:
      - add-router
      - master
    paths:
      - .github/workflows/wamp-profile-benchmarks.yml
      - bin/wamp-profile-validate
      - bin/check-bench-artifacts
      - native/bench/**
      - native/transport/**
      - packages/connectanum_bench/**
      - packages/connectanum_client/**
      - packages/connectanum_router/**
  workflow_dispatch:
    inputs:
      router_worker_counts:
        description: Router worker counts passed to the bench orchestrator
        required: false
        default: "1"
        type: string
      native_runtime_thread_counts:
        description: Tokio runtime thread counts passed to the bench orchestrator
        required: false
        default: "1"
        type: string
      workload_timeout_ms:
        description: Per-workload timeout in milliseconds
        required: false
        default: "300000"
        type: string

permissions:
  contents: read

env:
  CI: true

jobs:
  linux-wamp-profile:
    name: Linux WAMP profile gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap workspace
        run: bin/bootstrap

      - name: Run canonical WAMP profile gates
        env:
          INPUT_ROUTER_WORKER_COUNTS: ${{ github.event.inputs.router_worker_counts || '1' }}
          INPUT_NATIVE_RUNTIME_THREAD_COUNTS: ${{ github.event.inputs.native_runtime_thread_counts || '1' }}
          INPUT_WORKLOAD_TIMEOUT_MS: ${{ github.event.inputs.workload_timeout_ms || '300000' }}
        run: |
          set -euo pipefail
          bin/wamp-profile-validate \
            --out-dir "${GITHUB_WORKSPACE}/out/wamp-profile-validation" \
            --router-worker-counts "$INPUT_ROUTER_WORKER_COUNTS" \
            --native-runtime-thread-counts "$INPUT_NATIVE_RUNTIME_THREAD_COUNTS" \
            --workload-timeout-ms "$INPUT_WORKLOAD_TIMEOUT_MS"

      - name: Upload WAMP profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wamp-profile-benchmark-artifacts
          path: out/wamp-profile-validation
          if-no-files-found: error
