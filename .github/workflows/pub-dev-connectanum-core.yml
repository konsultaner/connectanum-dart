name: Publish connectanum_core to pub.dev

on:
  push:
    tags:
      - 'connectanum_core-v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate connectanum_core release tag
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - name: Validate package tag and archive
        run: |
          bin/validate-dart-package-publish-tag \
            connectanum_core \
            packages/connectanum_core
          bin/dart-package-publish-dry-run \
            --strict-release-ready \
            --show-release-plan \
            connectanum_core

  publish:
    name: Publish connectanum_core
    needs: validate
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/connectanum_core
      environment: pub.dev
