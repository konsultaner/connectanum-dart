name: kTLS HTTP/2 Benchmarks

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: HTTP/2 bench scenario to compare baseline TLS versus required kTLS
        required: false
        default: native/bench/scenarios/h2_ktls_benchmark.toml
        type: string
      workloads:
        description: Optional comma-separated workload names from the scenario to isolate in this rerun
        required: false
        default: ""
        type: string
      router_worker_counts:
        description: Router worker counts passed to the bench orchestrator
        required: false
        default: "1"
        type: string
      native_runtime_thread_counts:
        description: Tokio runtime thread counts passed to the bench orchestrator
        required: false
        default: "1,4"
        type: string
      repeat_count:
        description: Number of repeated baseline-vs-kTLS comparisons to aggregate into one stability report
        required: false
        default: "1"
        type: string
      repeat_order:
        description: Pass ordering for repeats. Use alternating to reduce thermal/order bias during manual reruns.
        required: false
        default: alternating
        type: choice
        options:
          - alternating
          - baseline-first
          - ktls-first
      cooldown_seconds:
        description: Seconds to sleep between passes and between repeats during manual reruns
        required: false
        default: "15"
        type: string
      artifact_policy:
        description: Optional artifact policy path. Leave blank to auto-use a matching scenario policy when present.
        required: false
        default: ""
        type: string
      skip_artifact_gate:
        description: Skip the artifact gate entirely for focused diagnostic reruns.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CI: true

jobs:
  linux-ktls-http2:
    name: Linux HTTP/2 kTLS benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1

      - uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap workspace
        run: bin/bootstrap

      - name: Run HTTP/2 TLS vs kTLS benchmark
        env:
          INPUT_SCENARIO: ${{ github.event.inputs.scenario }}
          INPUT_WORKLOADS: ${{ github.event.inputs.workloads }}
          INPUT_ROUTER_WORKER_COUNTS: ${{ github.event.inputs.router_worker_counts }}
          INPUT_NATIVE_RUNTIME_THREAD_COUNTS: ${{ github.event.inputs.native_runtime_thread_counts }}
          INPUT_REPEAT_COUNT: ${{ github.event.inputs.repeat_count }}
          INPUT_REPEAT_ORDER: ${{ github.event.inputs.repeat_order }}
          INPUT_COOLDOWN_SECONDS: ${{ github.event.inputs.cooldown_seconds }}
          INPUT_ARTIFACT_POLICY: ${{ github.event.inputs.artifact_policy }}
          INPUT_SKIP_ARTIFACT_GATE: ${{ github.event.inputs.skip_artifact_gate }}
        run: |
          set -euo pipefail
          extra_gate_args=()
          if [[ "${INPUT_SKIP_ARTIFACT_GATE:-false}" == "true" ]]; then
            extra_gate_args+=(--skip-artifact-gate)
          elif [[ -n "${INPUT_ARTIFACT_POLICY:-}" ]]; then
            extra_gate_args+=(--artifact-policy "${INPUT_ARTIFACT_POLICY}")
          fi

          bin/ktls-http2-bench \
            --scenario "${INPUT_SCENARIO:-native/bench/scenarios/h2_ktls_benchmark.toml}" \
            --workloads "${INPUT_WORKLOADS:-}" \
            --out-dir "${GITHUB_WORKSPACE}/out/ktls-http2-bench" \
            --router-worker-counts "${INPUT_ROUTER_WORKER_COUNTS:-1}" \
            --native-runtime-thread-counts "${INPUT_NATIVE_RUNTIME_THREAD_COUNTS:-1,4}" \
            --repeat-count "${INPUT_REPEAT_COUNT:-1}" \
            --repeat-order "${INPUT_REPEAT_ORDER:-alternating}" \
            --cooldown-seconds "${INPUT_COOLDOWN_SECONDS:-15}" \
            "${extra_gate_args[@]}"

      - name: Publish benchmark summary
        if: always()
        run: |
          set -euo pipefail
          out_dir="${GITHUB_WORKSPACE}/out/ktls-http2-bench"
          comparison_md="${out_dir}/comparison.md"
          host_info="${out_dir}/host-info.txt"

          {
            echo "# kTLS HTTP/2 benchmark"
            echo
            echo "- Workflow artifact: \`ktls-http2-bench-artifacts\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo

            if [[ -f "${comparison_md}" ]]; then
              cat "${comparison_md}"
            else
              echo "Comparison summary was not generated. Check the uploaded artifact bundle for partial outputs."
            fi

            if [[ -f "${host_info}" ]]; then
              echo
              echo "## Host Inputs"
              echo
              echo '```text'
              cat "${host_info}"
              echo '```'
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Upload HTTP/2 kTLS benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ktls-http2-bench-artifacts
          path: out/ktls-http2-bench
          if-no-files-found: error
