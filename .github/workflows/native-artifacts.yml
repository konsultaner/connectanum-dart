name: Native Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag name to publish or update on GitHub Releases
        required: false
        type: string
      release_name:
        description: Optional GitHub Release title override
        required: false
        type: string
      prerelease:
        description: Mark the published GitHub Release as a prerelease
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'ct-ffi-v*'
      - 'v*'

permissions:
  contents: read

jobs:
  ct-ffi:
    name: ct_ffi (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: Linux arm64
            runner: ubuntu-24.04-arm
          - name: macOS Apple Silicon
            runner: macos-15
          - name: macOS Intel
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Package ct_ffi artifact
        id: package
        run: bin/package-native-artifact

      - name: Sign packaged artifacts
        env:
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          MANIFEST_PATH: ${{ steps.package.outputs.manifest_path }}
        run: |
          set -euo pipefail

          for artifact in "$ARCHIVE_PATH" "$CHECKSUM_PATH" "$MANIFEST_PATH"; do
            cosign sign-blob "$artifact" \
              --bundle "${artifact}.sigstore.json" \
              --yes
          done

      - name: Verify packaged artifact bundles
        env:
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          MANIFEST_PATH: ${{ steps.package.outputs.manifest_path }}
          WORKFLOW_IDENTITY: https://github.com/${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          for artifact in "$ARCHIVE_PATH" "$CHECKSUM_PATH" "$MANIFEST_PATH"; do
            cosign verify-blob "$artifact" \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity "$WORKFLOW_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
          done

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.package.outputs.manifest_path }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name }}
          path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.archive_path }}.sigstore.json
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.package.outputs.checksum_path }}.sigstore.json
            ${{ steps.package.outputs.manifest_path }}
            ${{ steps.package.outputs.manifest_path }}.sigstore.json

  publish-release:
    name: Publish GitHub Release
    needs: ct-ffi
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ct-ffi-*
          path: out/github-release
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="${INPUT_RELEASE_TAG:-}"
          fi

          if [[ -z "$release_tag" ]]; then
            printf 'No release tag resolved for this run.\n' >&2
            exit 1
          fi

          if [[ -n "${INPUT_RELEASE_NAME:-}" ]]; then
            release_title="$INPUT_RELEASE_NAME"
          elif [[ "$release_tag" == ct-ffi-v* ]]; then
            release_title="Connectanum native transport assets v${release_tag#ct-ffi-v}"
          elif [[ "$release_tag" == v* ]]; then
            release_title="Connectanum ${release_tag}"
          else
            release_title="Connectanum release ${release_tag}"
          fi

          printf 'release_tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"
          printf 'release_title=%s\n' "$release_title" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(out/github-release/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            printf 'No release assets were downloaded.\n' >&2
            exit 1
          fi

          prerelease_args=()
          if [[ "${INPUT_PRERELEASE:-false}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          repo_url="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}"
          workflow_identity="https://github.com/${GITHUB_WORKFLOW_REF}"
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          human_summary='This release publishes the current prebuilt native transport bundles for Connectanum.'
          related_artifacts_lines=$'- Deployment guide: '"${repo_url}/blob/${GITHUB_SHA}/docs/deployment.md"$'\n- Router container images: `ghcr.io/'"${owner}"'/connectanum-router`'
          generate_notes='false'
          generated_notes_body=''

          if [[ "$RELEASE_TAG" == ct-ffi-v* ]]; then
            human_summary='This release publishes the standalone native transport bundles used by the Connectanum router and native client transports.'
          elif [[ "$RELEASE_TAG" == v* ]]; then
            generate_notes='true'
          fi

          release_notes_file="$(mktemp)"
          trap 'rm -f "$release_notes_file"' EXIT

          cat > "$release_notes_file" <<EOF
          ## What this release includes

          ${human_summary}

          ## Assets

          - \`ct-ffi-<host-triple>.tar.gz\` - prebuilt native transport bundle for one platform
          - \`*.sha256\` - checksum for the matching archive
          - \`*.manifest.json\` - machine-readable build metadata
          - \`*.sigstore.json\` - detached Sigstore verification bundle

          ## Current prebuilt platforms

          - Linux x64 (\`x86_64-unknown-linux-gnu\`)
          - Linux arm64 (\`aarch64-unknown-linux-gnu\`)
          - macOS arm64 (\`aarch64-apple-darwin\`)
          - macOS Intel (\`x86_64-apple-darwin\`)

          ## How to use the bundle

          1. Download the archive that matches your platform.
          2. Extract it and point \`CONNECTANUM_NATIVE_LIB\` at the included library.
          3. Or install the matching bundle directly with:
             - \`dart run connectanum_router:tool/install_native.dart --tag ${RELEASE_TAG}\`
             - \`dart run connectanum_client:tool/install_native.dart --tag ${RELEASE_TAG}\`

          ## Verification

          - GitHub attestation:
            \`gh attestation verify path/to/ct-ffi-<host-triple>.tar.gz -R ${GITHUB_REPOSITORY}\`
          - Detached Sigstore bundle:
            \`cosign verify-blob path/to/ct-ffi-<host-triple>.tar.gz --bundle path/to/ct-ffi-<host-triple>.tar.gz.sigstore.json --certificate-identity ${workflow_identity} --certificate-oidc-issuer https://token.actions.githubusercontent.com\`

          ## Related links

          - Repository README: ${repo_url}/blob/${GITHUB_SHA}/README.md
          ${related_artifacts_lines}
          EOF

          release_notes="$(cat "$release_notes_file")"

          if [[ "$generate_notes" == 'true' ]]; then
            generated_notes_body="$(gh api \
              --method POST \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$GITHUB_SHA" \
              --jq '.body')"

            if [[ -n "$generated_notes_body" ]]; then
              release_notes="${release_notes}"$'\n\n## Changelog\n\n'"${generated_notes_body}"
            fi
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes "$release_notes"
            gh release upload "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "${assets[@]}"
          else
            create_args=(
              --repo "$GITHUB_REPOSITORY"
              --notes "$release_notes"
            )

            if [[ -n "$RELEASE_TITLE" ]]; then
              create_args+=(--title "$RELEASE_TITLE")
            fi

            if [[ "$RELEASE_TAG" == ct-ffi-v* ]]; then
              create_args+=(--latest=false)
            fi

            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "$GITHUB_SHA")
            fi

            gh release create "$RELEASE_TAG" \
              "${create_args[@]}" \
              "${prerelease_args[@]}" \
              "${assets[@]}"
          fi
