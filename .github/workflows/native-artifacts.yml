name: Native Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag name to publish or update on GitHub Releases
        required: false
        type: string
      release_name:
        description: Optional GitHub Release title override
        required: false
        type: string
      prerelease:
        description: Mark the published GitHub Release as a prerelease
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'ct-ffi-v*'
      - 'v*'

permissions:
  contents: read

jobs:
  ct-ffi:
    name: ct_ffi (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Package ct_ffi artifact
        id: package
        run: bin/package-native-artifact

      - name: Sign packaged artifacts
        env:
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          MANIFEST_PATH: ${{ steps.package.outputs.manifest_path }}
        run: |
          set -euo pipefail

          for artifact in "$ARCHIVE_PATH" "$CHECKSUM_PATH" "$MANIFEST_PATH"; do
            cosign sign-blob "$artifact" \
              --bundle "${artifact}.sigstore.json" \
              --yes
          done

      - name: Verify packaged artifact bundles
        env:
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          MANIFEST_PATH: ${{ steps.package.outputs.manifest_path }}
          WORKFLOW_IDENTITY: https://github.com/${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          for artifact in "$ARCHIVE_PATH" "$CHECKSUM_PATH" "$MANIFEST_PATH"; do
            cosign verify-blob "$artifact" \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity "$WORKFLOW_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
          done

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.package.outputs.manifest_path }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.bundle_name }}
          path: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.archive_path }}.sigstore.json
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.package.outputs.checksum_path }}.sigstore.json
            ${{ steps.package.outputs.manifest_path }}
            ${{ steps.package.outputs.manifest_path }}.sigstore.json

  publish-release:
    name: Publish GitHub Release
    needs: ct-ffi
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ct-ffi-*
          path: out/github-release
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="${INPUT_RELEASE_TAG:-}"
          fi

          if [[ -z "$release_tag" ]]; then
            printf 'No release tag resolved for this run.\n' >&2
            exit 1
          fi

          if [[ -n "${INPUT_RELEASE_NAME:-}" ]]; then
            release_title="$INPUT_RELEASE_NAME"
          else
            release_title=""
          fi

          printf 'release_tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"
          printf 'release_title=%s\n' "$release_title" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(out/github-release/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            printf 'No release assets were downloaded.\n' >&2
            exit 1
          fi

          prerelease_args=()
          if [[ "${INPUT_PRERELEASE:-false}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          workflow_identity="https://github.com/${GITHUB_WORKFLOW_REF}"
          release_notes=$'Native `ct_ffi` bundles are attached for this tag.\n\nUse `CONNECTANUM_NATIVE_LIB` with the extracted host archive. GitHub artifact attestations are published for the bundled archive/checksum/manifest set; verify the downloaded archive with `gh attestation verify` against this repository.\n\nDetached Sigstore blob bundles are also attached as `<asset>.sigstore.json`; verify a downloaded asset offline with `cosign verify-blob <asset> --bundle <asset>.sigstore.json --certificate-identity '"$workflow_identity"$' --certificate-oidc-issuer https://token.actions.githubusercontent.com`.'

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              "${assets[@]}"
          else
            create_args=(
              --repo "$GITHUB_REPOSITORY"
              --generate-notes
              --notes "$release_notes"
            )

            if [[ -n "$RELEASE_TITLE" ]]; then
              create_args+=(--title "$RELEASE_TITLE")
            fi

            if [[ "$RELEASE_TAG" == ct-ffi-v* ]]; then
              create_args+=(--latest=false)
            fi

            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              create_args+=(--verify-tag)
            else
              create_args+=(--target "$GITHUB_SHA")
            fi

            gh release create "$RELEASE_TAG" \
              "${create_args[@]}" \
              "${prerelease_args[@]}" \
              "${assets[@]}"
          fi
